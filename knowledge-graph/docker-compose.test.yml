version: '3.8'

services:
  # Neo4j for testing
  neo4j-test:
    image: neo4j:5-community
    container_name: musicai-neo4j-test
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/test_password
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_memory_pagecache_size: 256M
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "test_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ for testing
  rabbitmq-test:
    image: rabbitmq:3-management-alpine
    container_name: musicai-rabbitmq-test
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Knowledge graph service for testing
  knowledge-graph-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicai-knowledge-graph-test
    ports:
      - "8003:8003"
      - "50053:50053"
    environment:
      SERVICE_NAME: knowledge-graph
      SERVICE_VERSION: 0.1.0
      REST_HOST: 0.0.0.0
      REST_PORT: 8003
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50053
      NEO4J_URI: bolt://neo4j-test:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test_password
      NEO4J_DATABASE: musicai
      RABBITMQ_HOST: rabbitmq-test
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - ./.coveragerc:/app/.coveragerc
    depends_on:
      neo4j-test:
        condition: service_healthy
      rabbitmq-test:
        condition: service_healthy
    networks:
      - test-network
    command: >
      sh -c "
        echo 'Waiting for services to be ready...' &&
        sleep 5 &&
        echo 'Initializing ontology...' &&
        python scripts/init_ontology.py &&
        echo 'Running tests...' &&
        pytest -v --cov=src --cov-report=term-missing --cov-report=html
      "

networks:
  test-network:
    driver: bridge
