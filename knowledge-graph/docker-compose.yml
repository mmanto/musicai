version: '3.8'

services:
  knowledge-graph:
    build: .
    container_name: musicai-knowledge-graph
    env_file: ../.env
    ports:
      - "8003:8003"
      - "50053:50053"
    environment:
      # Service
      SERVICE_NAME: knowledge-graph
      SERVICE_VERSION: 0.1.0

      # REST API
      REST_HOST: 0.0.0.0
      REST_PORT: 8003

      # gRPC
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50053

      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: musicai_password

      # GNN
      GNN_EMBEDDING_DIM: 256
      GNN_HIDDEN_DIM: 512
      GNN_NUM_LAYERS: 3
      GNN_DROPOUT: 0.1
      GNN_MODEL_PATH: ./models/gnn_model.pt

    volumes:
      - ./models:/app/models
      - ./src:/app/src
    depends_on:
      - neo4j
    networks:
      - musicai-network
    restart: unless-stopped
    external_links:
      - musicai-rabbitmq:rabbitmq

  neo4j:
    image: neo4j:5-community
    container_name: musicai-neo4j-kg
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - musicai-network
    restart: unless-stopped

volumes:
  neo4j-data:
  neo4j-logs:

networks:
  musicai-network:
    external: true
