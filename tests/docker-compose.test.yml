# Docker Compose for running integration tests
# Usage: docker-compose -f tests/docker-compose.test.yml up -d

services:
  # RabbitMQ for messaging tests
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: musicai-test-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching tests
  redis:
    image: redis:7-alpine
    container_name: musicai-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: musicai-network
    external: true
